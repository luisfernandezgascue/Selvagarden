<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1400, initial-scale=0.5">
<title>Selva Garden — App Completa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  body { background: #E8E5DE; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/components.jsx"></script>
  <script type="text/babel" src="src/screens/onboarding.jsx"></script>
  <script type="text/babel" src="src/screens/home.jsx"></script>
  <script type="text/babel" src="src/screens/tienda.jsx"></script>
  <script type="text/babel" src="src/screens/mi-selva.jsx"></script>
  <script type="text/babel" src="src/screens/mi-tarjeta.jsx"></script>
  <script type="text/babel" src="src/screens/yo.jsx"></script>
  <script type="text/babel" src="src/screens/producto.jsx"></script>
  <script type="text/babel" src="src/screens/calculadora.jsx"></script>
  <script type="text/babel" src="src/prototype.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState } = React;

    function Stage({ children, width = 375, height = 780, label }) {
      return (
        <div data-screen-label={label} style={{ width, height, display:'flex', alignItems:'center', justifyContent:'center' }}>
          {children}
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas>
          <DCSection id="prototype" title="01 · Prototipo interactivo" subtitle="Toca el tab bar — navegación real entre Inicio, Tienda, Mi Selva, Mi Tarjeta y Yo">
            <DCArtboard id="proto" label="Prototipo · 5 tabs en vivo" width={375} height={780}>
              <Stage label="00 Prototipo interactivo">
                <InteractivePrototype/>
              </Stage>
            </DCArtboard>
          </DCSection>

          <DCSection id="onboarding" title="02 · Onboarding" subtitle="Bienvenida → registro → tarjeta lista">
            <DCArtboard id="ob1" label="2.1 · Bienvenida" width={375} height={780}>
              <Stage label="01 Bienvenida"><OnboardWelcome/></Stage>
            </DCArtboard>
            <DCArtboard id="ob2" label="2.2 · Registro" width={375} height={780}>
              <Stage label="02 Registro"><OnboardSignup/></Stage>
            </DCArtboard>
            <DCArtboard id="ob3" label="2.3 · Tarjeta lista" width={375} height={780}>
              <Stage label="03 Tarjeta lista"><OnboardCardReady/></Stage>
            </DCArtboard>
          </DCSection>

          <DCSection id="core" title="03 · Pantallas principales" subtitle="Las 5 pestañas — modo normal">
            <DCArtboard id="home" label="3.1 · Inicio" width={375} height={780}>
              <Stage label="04 Inicio"><Home/></Stage>
            </DCArtboard>
            <DCArtboard id="shop" label="3.2 · Tienda" width={375} height={780}>
              <Stage label="05 Tienda"><Tienda/></Stage>
            </DCArtboard>
            <DCArtboard id="selva" label="3.3 · Mi Selva" width={375} height={780}>
              <Stage label="06 Mi Selva"><MiSelva/></Stage>
            </DCArtboard>
            <DCArtboard id="card" label="3.4 · Mi Tarjeta" width={375} height={780}>
              <Stage label="07 Mi Tarjeta"><MiTarjeta/></Stage>
            </DCArtboard>
            <DCArtboard id="me" label="3.5 · Yo" width={375} height={780}>
              <Stage label="08 Yo"><Yo/></Stage>
            </DCArtboard>
          </DCSection>

          <DCSection id="producto" title="04 · Detalle de producto" subtitle="Ficha editorial con infografía de cuidados">
            <DCArtboard id="prod" label="4.1 · Producto" width={375} height={780}>
              <Stage label="09 Producto"><Producto/></Stage>
            </DCArtboard>
          </DCSection>

          <DCSection id="store" title="05 · Modo Tienda" subtitle="Activado por geolocalización en Las Mercedes">
            <DCArtboard id="home-store" label="5.1 · Inicio · modo tienda" width={375} height={780}>
              <Stage label="10 Inicio modo tienda"><Home storeMode={true}/></Stage>
            </DCArtboard>
            <DCArtboard id="card-store" label="5.2 · Mi Tarjeta · modo tienda" width={375} height={780}>
              <Stage label="11 Tarjeta modo tienda"><MiTarjeta storeMode={true}/></Stage>
            </DCArtboard>
          </DCSection>

          <DCSection id="tool" title="06 · Herramienta interna" subtitle="Calculadora de arreglos para floristas — envío vía WhatsApp">
            <DCArtboard id="calc" label="6.1 · Calculadora de ramos" width={760} height={920}>
              <Stage label="12 Calculadora" width={760} height={920}><Calculadora/></Stage>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
